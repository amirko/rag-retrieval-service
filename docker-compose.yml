version: "3.9"

services:
  db:
    image: ankane/pgvector
    container_name: pgvector-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama-embedding:
    image: ollama/ollama:latest
    container_name: ollama-embedding
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_embedding_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint: /bin/sh
    command: >
      -c "ollama serve &
      sleep 10 &&
      ollama pull nomic-embed-text &&
      wait"

  ollama-generation:
    image: ollama/ollama:latest
    container_name: ollama-generation
    ports:
      - "11435:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_generation_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint: /bin/sh
    command: >
      -c "ollama serve &
      sleep 10 &&
      ollama pull mistral &&
      wait"

  # app:
  #   build: .
  #   container_name: rag-app
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@db:5432/rag_db
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
